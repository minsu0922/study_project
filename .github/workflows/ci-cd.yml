# CI/CD 파이프라인 (로드맵 5, docs/README.md 참고)
#
# 흐름: main에 push 되거나 PR이 열리면 → build-and-test가 항상 돈다.
#       그중 "main에 직접 push"(=PR 머지 포함)일 때만 build-and-push-image가 이어서 돈다.
#       → PR 단계에서는 검증만 하고, 실제로 main에 반영된 코드만 이미지로 남긴다.
#
# 왜 GHCR(GitHub Container Registry)인가: 별도 계정 가입·API 키 발급 없이
# 저장소에 딸린 GITHUB_TOKEN(실행마다 자동 발급되는 임시 출입증)만으로 push 가능해서
# 비용 0원으로 "빌드 결과물을 창고에 저장"까지의 CD 흐름을 완성할 수 있다.
# 실제 서버로 배포(Fly.io 등)하려면 외부 서비스 가입 + Secrets 등록이 추가로 필요하므로
# 이 프로젝트에서는 일단 이미지 저장까지만 한다 (CLAUDE.md: 외부로 나가는 작업은 사용자 확인 필요).
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # docs/07·docker-compose.yml과 동일한 자격증명·포트로 서비스 컨테이너를 띄운다.
    # 이렇게 하면 application.yml의 기본값(DB_USERNAME=csquiz, REDIS_HOST=127.0.0.1 등)을
    # 그대로 써도 CI에서 앱이 로컬처럼 MySQL·Redis에 붙을 수 있다 (env 오버라이드 불필요).
    # 이 프로젝트는 Testcontainers 대신 "진짜 떠 있는 DB/Redis에 붙는" 방식으로 테스트를 짜서
    # (build.gradle 주석 참고) 서비스 컨테이너가 필수다.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: csquiz
          MYSQL_USER: csquiz
          MYSQL_PASSWORD: csquiz1234
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 저장소 코드 받기
        uses: actions/checkout@v4

      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Gradle 의존성·빌드 캐시를 GitHub Actions 캐시에 저장/복원 → 매번 처음부터 안 받음
      - name: Gradle 설정 (캐시 포함)
        uses: gradle/actions/setup-gradle@v4

      # 리포에 커밋된 gradlew는 실행 권한 비트가 없어(윈도우에서 생성됨) 리눅스 러너에서
      # "Permission denied"가 난다. 커밋 자체를 건드리는 대신 CI에서만 권한을 부여한다.
      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: 빌드 + 테스트
        run: ./gradlew build --no-daemon

      # 테스트 실패 시에도 리포트는 남겨서 Actions 탭에서 바로 원인을 볼 수 있게 한다.
      - name: 테스트 리포트 업로드 (실패 시에도)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/test
          retention-days: 7

  build-and-push-image:
    needs: build-and-test
    # PR에서는 검증만 하고 이미지는 안 만든다 — main에 실제로 반영됐을 때만 창고에 쌓는다.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # GHCR에 push하려면 GITHUB_TOKEN에 이 권한이 필요

    steps:
      - name: 저장소 코드 받기
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # 별도 발급 불필요 — 실행마다 자동 생성되는 임시 토큰

      - name: 이미지 빌드 + GHCR에 push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # :latest(최신)와 커밋 SHA(그 시점 코드를 정확히 가리키는 고정 태그) 둘 다 남긴다.
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}