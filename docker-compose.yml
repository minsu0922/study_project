# 로컬 개발용 인프라. `docker compose up -d` 로 MySQL 8 기동.
# 접속: jdbc:mysql://localhost:3306/csquiz  (user: csquiz / pw: csquiz1234)
services:
  mysql:
    image: mysql:8.0
    container_name: csquiz-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: csquiz
      MYSQL_USER: csquiz
      MYSQL_PASSWORD: csquiz1234
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpw"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 로드맵 2에서 활성화 (캐싱 + refresh 토큰 저장소)
  # 참고: Docker가 없는 개발 PC에서는 WSL에 설치해 사용 중 —
  #   설치:  wsl -u root -e sh -c "apt-get install -y redis-server"
  #   기동:  wsl -u root -e service redis-server start
  redis:
    image: redis:7-alpine
    container_name: csquiz-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data:
