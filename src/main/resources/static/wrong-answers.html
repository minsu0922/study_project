<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>오답노트 — csquiz</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header id="nav"></header>

<main class="container">
  <h1>오답노트</h1>
  <p class="meta">틀린 적 있는 문제를 문제당 1건(가장 최근에 틀린 답 기준)으로 모아 보여줍니다.
    틀린 문제는 <a href="/review.html">복습</a>에서 1→3→7→14→30일 간격으로 다시 나와요 —
    각 카드의 <span class="badge orange" style="margin:0">N단계</span> 배지가 지금 어디까지 왔는지예요.</p>

  <div class="filters">
    <div class="field">
      <label for="domainFilter">도메인</label>
      <select id="domainFilter"></select>
    </div>
  </div>

  <div id="message"></div>
  <div id="list"></div>

  <div class="pager" id="pager" hidden>
    <button id="prevBtn" class="btn-outline">이전</button>
    <span class="info" id="pageInfo"></span>
    <button id="nextBtn" class="btn-outline">다음</button>
  </div>
</main>

<script src="/js/api.js"></script>
<script>
/* 오답노트 페이지 — GET /api/me/wrong-answers (로그인 필수).
 * 페이지 진입 시점에 로그인 여부를 확인해 미리 로그인으로 보낸다.
 * (API를 호출해 401을 받고 나서야 알려주는 것보다 빠르고 친절) */
renderNav("wrong");

if (!isLoggedIn()) {
  // 로그인 후 다시 돌아올 수 있게 안내만 하고 자동 이동은 하지 않는다
  document.getElementById("message").innerHTML =
    `<div class="alert info">오답노트는 <b>내 계정의 기록</b>이라 로그인이 필요합니다.
     <a href="/login.html">로그인하기</a></div>`;
} else {
  init();
}

function init() {
  const domainFilter = document.getElementById("domainFilter");
  fillSelect(domainFilter, DOMAINS, "전체 도메인");
  let page = 0;

  /* problemId → 복습 상태(stage/status) 맵.
   * 오답노트와 복습은 같은 문제를 다른 관점으로 보는 페이지라(오답노트=기록, 복습=할 일),
   * 여기에 복습 단계 배지를 달아 두 페이지가 연결돼 있음을 보여준다(메뉴 역할 분리).
   * 오답노트 API에 stage를 합쳐 내려주는 방법도 있지만, 두 도메인(quiz/review)을
   * 백엔드에서 조인으로 엮는 대신 프론트에서 합성 — 학습 프로젝트라 API 경계를
   * 도메인 단위로 깔끔하게 유지하는 쪽을 택했다. */
  let reviewMap = new Map();

  /** 내 복습 현황 전체를 페이지 단위(size=50, 서버 상한)로 끝까지 받아 맵으로 만든다.
   * 안전장치로 20페이지(=1,000문제)에서 끊는다 — 그보다 많으면 배지 일부가 빠질 뿐,
   * 오답노트 본문은 멀쩡하다. 실패해도 마찬가지(배지만 생략)라 조용히 삼킨다. */
  async function loadReviewMap() {
    try {
      const map = new Map();
      for (let p = 0; p < 20; p++) {
        const data = await api(`/api/me/reviews?size=50&page=${p}`);
        data.content.forEach(r => map.set(r.problemId, r));
        if (!data.hasNext) break;
      }
      reviewMap = map;
    } catch { /* 배지는 부가 정보 — 실패가 페이지를 막으면 안 된다 */ }
  }

  /** 복습 단계 배지 — 복습 페이지와 같은 표기(N단계/졸업)를 써서 두 페이지를 잇는다.
   * 배지 자체가 복습 페이지로 가는 링크. 복습 항목이 없으면(로드맵 4 이전 오답 등) 생략. */
  function reviewBadge(problemId) {
    const r = reviewMap.get(problemId);
    if (!r) return "";
    const label = r.status === "GRADUATED" ? "복습 졸업 🎓" : `복습 ${r.stage + 1}단계`;
    const color = r.status === "GRADUATED" ? "green" : "orange";
    return `<a class="badge ${color}" href="/review.html" title="복습 페이지로">${label}</a>`;
  }

  async function load() {
    const msg = document.getElementById("message");
    msg.innerHTML = "";
    try {
      const params = new URLSearchParams({ page });
      if (domainFilter.value) params.set("domain", domainFilter.value);
      const data = await api("/api/me/wrong-answers?" + params);

      const list = document.getElementById("list");
      if (data.content.length === 0) {
        list.innerHTML = `<div class="card">아직 오답이 없습니다. 🎉
          <a href="/quiz.html">퀴즈를 풀러 가볼까요?</a></div>`;
      } else {
        // 오답노트는 "복습"이 목적이라 내 답·정답·해설을 한 번에 다 보여준다
        list.innerHTML = data.content.map(w => `
          <div class="card">
            <div style="margin-bottom:6px">
              <span class="badge">${escapeHtml(domainLabel(w.domain))}</span>
              <span class="badge gray">${escapeHtml(difficultyLabel(w.difficulty))}</span>
              <span class="badge gray">${escapeHtml(typeLabel(w.type))}</span>
              ${reviewBadge(w.problemId)}
            </div>
            <h3>${escapeHtml(w.question)}</h3>
            <div style="color:var(--wrong)">내 답: ${escapeHtml(w.myAnswer)}</div>
            <div style="color:var(--correct)">정답: ${escapeHtml(w.correctAnswer ?? "")}</div>
            ${w.explanation ? `<div class="meta" style="margin-top:6px">${escapeHtml(w.explanation)}</div>` : ""}
            <div class="meta" style="margin-top:6px">마지막으로 틀린 날: ${formatDate(w.lastSubmittedAt)}</div>
          </div>`).join("");
      }

      const pager = document.getElementById("pager");
      pager.hidden = data.totalPages <= 1;
      document.getElementById("pageInfo").textContent = `${data.page + 1} / ${Math.max(data.totalPages, 1)}`;
      document.getElementById("prevBtn").disabled = data.page === 0;
      document.getElementById("nextBtn").disabled = !data.hasNext;
    } catch (e) {
      const text = e.status === 401
        ? `로그인이 만료됐습니다. <a href="/login.html">다시 로그인해 주세요.</a>`
        : `불러오지 못했습니다: ${escapeHtml(e.message)}`;
      msg.innerHTML = `<div class="alert error">${text}</div>`;
    }
  }

  domainFilter.addEventListener("change", () => { page = 0; load(); });
  document.getElementById("prevBtn").addEventListener("click", () => { page--; load(); });
  document.getElementById("nextBtn").addEventListener("click", () => { page++; load(); });
  // 복습 맵을 먼저 받고 나서 목록을 그린다 — 목록을 먼저 그리면 배지가 없다가
  // 나중에 나타나며 화면이 덜컥거린다(요청 1번 기다리는 비용 < 깜빡임 비용).
  loadReviewMap().then(load);
}
</script>
</body>
</html>
