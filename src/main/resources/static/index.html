<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>csquiz — CS 퀴즈로 면접 준비</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header id="nav"></header>

<main class="container">
  <!-- v2: 홈 = 문서 목록이 아니라 "시작 화면".
       퀴즈 사이트의 첫 화면은 "무엇을 읽을까"가 아니라 "지금 뭘 풀까"에 답해야 한다.
       핵심 동작(퀴즈 시작)을 가장 크게, 오늘의 복습은 할 일이 있을 때만 강조(주황). -->
  <section class="hero">
    <h1>CS 면접, <span class="accent">매일 조금씩</span></h1>
    <p>퀴즈로 풀고, 틀린 건 잊어버릴 때쯤 다시 만나요.<br>
      네트워크 · 운영체제 · 데이터베이스 · 자료구조 등 10개 분야</p>
    <a href="/quiz.html" class="btn btn-lg">퀴즈 시작하기 🚀</a>
  </section>

  <section class="quick-grid" id="quickGrid">
    <!-- 오늘의 복습 카드: 로그인 + 복습할 게 있을 때만 JS가 맨 앞에 끼워 넣는다 -->
    <a class="quick-card" href="/quiz.html">
      <div class="icon">✍️</div>
      <h3>퀴즈 풀기</h3>
      <p>도메인·난이도를 골라 한 문제씩 도전</p>
    </a>
    <a class="quick-card" href="/wrong-answers.html">
      <div class="icon">📕</div>
      <h3>오답노트</h3>
      <p>내가 뭘 틀렸고 뭐라고 답했는지 한눈에</p>
    </a>
    <a class="quick-card" href="/documents.html">
      <div class="icon">📚</div>
      <h3>CS 문서</h3>
      <p>개념 정리를 읽고 나서 문제로 확인</p>
    </a>
  </section>
</main>

<script src="/js/api.js"></script>
<script>
/* 홈 화면 — 정적 카드 3개 + (로그인 시) 동적 카드 2개를 앞에 끼워 넣는다.
 *   ① 오늘의 퀴즈(로드맵 6): 항상 표시 — 이 카드가 데일리 기능의 유일한 입구다(docs/12).
 *      홈 방문이 곧 GET /api/me/daily-quiz 라서, 그날 첫 방문이 세트를 만든다(지연 생성).
 *   ② 오늘의 복습: 할 일이 실제로 있을 때만 — "복습 0개인데 복습하러 가라"는 카드는
 *      눌러봤자 허탕이라, 있을 때만 (그리고 주황색으로) 보여준다.
 * 두 카드는 독립적으로 실패해도 되도록 try를 분리한다 — 홈은 카드 없이도 완전한 화면. */
renderNav("home");

(async () => {
  if (!isLoggedIn()) return;
  const grid = document.getElementById("quickGrid");

  // ② 오늘의 복습 — 먼저 prepend (나중에 prepend되는 ①이 최종 맨 앞이 되도록 순서 고정)
  try {
    const data = await api("/api/me/reviews/today?size=1"); // 개수만 필요 — 본문 최소화
    if (data.totalElements > 0) {
      const card = document.createElement("a");
      card.className = "quick-card due";
      card.href = "/review.html";
      card.innerHTML = `
        <div class="icon">📅</div>
        <h3>오늘의 복습 ${data.totalElements}개</h3>
        <p>잊어버리기 전에 다시 풀 시간이에요</p>`;
      grid.prepend(card);
    }
  } catch (e) { /* 실패는 조용히 — 위 주석 */ }

  // ① 오늘의 퀴즈 — 미시작/진행 중/완료 3상태 + 스트릭(docs/12)
  try {
    const d = await api("/api/me/daily-quiz");
    const { total, solved } = d.progress;
    const streak = d.streak > 0 ? ` · 🔥 ${d.streak}일째` : "";
    const card = document.createElement("a");
    card.href = "/daily.html";
    if (d.completed) {
      card.className = "quick-card";
      card.innerHTML = `
        <div class="icon">✅</div>
        <h3>오늘의 퀴즈 완료${streak}</h3>
        <p>내일 새 세트가 준비돼요 — 결과 다시 보기</p>`;
    } else {
      card.className = "quick-card due"; // 할 일이 남아 있다 = 주황 강조(복습 카드와 같은 규칙)
      card.innerHTML = `
        <div class="icon">🎯</div>
        <h3>오늘의 퀴즈 ${solved}/${total}${streak}</h3>
        <p>${solved === 0 ? "나에게 맞춘 오늘의 세트가 준비됐어요" : "이어서 풀면 오늘 완료!"}</p>`;
    }
    grid.prepend(card); // 오늘의 할 일 중에서도 맨 앞 — 데일리가 이 사이트의 습관 고리다
  } catch (e) { /* 실패는 조용히 — 위 주석 */ }
})();
</script>
</body>
</html>
