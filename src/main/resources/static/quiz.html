<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>자유 퀴즈 — csquiz</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header id="nav"></header>

<main class="container">
  <!-- 화면 1: 설정(필터 고르고 시작) — 시작하면 숨기고 플레이어를 보여준다.
       v1은 필터+문제 나열이 한 화면에 있었지만, v2는 "설정 → 풀이 → 결과"의
       단계 구조라 화면을 통째로 전환한다(시험지를 받으면 문제에만 집중). -->
  <section id="setup">
    <!-- "자유"가 이름에 들어가는 이유: 오늘의 퀴즈(시스템이 골라줌)와의 차이를
         이름만으로 설명하기 위함(UX 1단계 개편). 아래 안내 한 줄이 그 차이를 굳힌다. -->
    <h1>자유 퀴즈</h1>
    <p class="meta" style="margin-top:-6px">분야·난이도를 직접 골라 원하는 만큼 풉니다 —
      매일 추천 세트는 <a href="/daily.html">오늘의 퀴즈</a>에서.</p>
    <div id="loginNotice"></div>

    <div class="card">
      <div class="filters" style="margin-bottom:0">
        <div class="field"><label>도메인</label><select id="fDomain"></select></div>
        <div class="field"><label>난이도</label><select id="fLevel"></select></div>
        <div class="field"><label>유형</label><select id="fType"></select></div>
        <div class="field"><label>문제 수</label>
          <select id="fSize"><option>5</option><option selected>10</option><option>20</option></select>
        </div>
      </div>
      <div style="text-align:center;margin-top:18px">
        <button id="startBtn" class="btn-lg">퀴즈 시작 🚀</button>
      </div>
    </div>
    <div id="message"></div>
  </section>

  <!-- 화면 2: 플레이어(js/player.js가 이 안을 통째로 그린다) -->
  <section id="player" hidden></section>
</main>

<script src="/js/api.js"></script>
<script src="/js/player.js"></script>
<script>
/* 퀴즈 페이지 — 흐름:
 *   1) 설정 화면에서 필터 선택 → [퀴즈 시작] → GET /api/quiz
 *   2) startPlayer()가 한 문제씩 진행(제출 API는 플레이어가 호출)
 *   3) 결과 화면의 [새 퀴즈 만들기] → 설정 화면 복귀
 * 정답·해설은 서버가 절대 미리 안 내려준다(docs/03) — 채점 응답에서만 온다. */
renderNav("quiz");

fillSelect(document.getElementById("fDomain"), DOMAINS, "전체");
fillSelect(document.getElementById("fLevel"), DIFFICULTIES, "전체");
fillSelect(document.getElementById("fType"), TYPES, "전체");

// 문제 조회는 공개 API지만 채점은 로그인 필수 — 풀기 전에 미리 알려주는 게 친절
if (!isLoggedIn()) {
  document.getElementById("loginNotice").innerHTML =
    `<div class="alert info">문제는 누구나 볼 수 있지만, <b>채점(제출)은 로그인해야</b> 가능합니다.
     <a href="/login.html">로그인하기</a></div>`;
}

const setupEl = document.getElementById("setup");
const playerEl = document.getElementById("player");

document.getElementById("startBtn").addEventListener("click", start);

async function start() {
  const msg = document.getElementById("message");
  msg.innerHTML = "";
  try {
    const params = new URLSearchParams({ size: document.getElementById("fSize").value });
    for (const [param, id] of [["domain", "fDomain"], ["level", "fLevel"], ["type", "fType"]]) {
      const v = document.getElementById(id).value;
      if (v) params.set(param, v);
    }
    const data = await api("/api/quiz?" + params);
    if (data.problems.length === 0) {
      msg.innerHTML = `<div class="alert info">조건에 맞는 문제가 없습니다. 필터를 바꿔 보세요.</div>`;
      return;
    }
    // 설정 화면 → 플레이어 화면 전환
    setupEl.hidden = true;
    playerEl.hidden = false;
    startPlayer(playerEl, data.problems, {
      exitLabel: "새 퀴즈 만들기",
      onExit: () => {           // 결과 화면에서 복귀: 플레이어를 비우고 설정을 다시 보여준다
        playerEl.hidden = true;
        playerEl.innerHTML = "";
        setupEl.hidden = false;
        window.scrollTo({ top: 0 });
      },
    });
  } catch (e) {
    msg.innerHTML = `<div class="alert error">문제를 불러오지 못했습니다: ${escapeHtml(e.message)}</div>`;
  }
}
</script>
</body>
</html>
