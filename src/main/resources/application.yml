spring:
  application:
    name: csquiz

  datasource:
    url: jdbc:mysql://localhost:3306/csquiz?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true
    username: ${DB_USERNAME:csquiz}
    password: ${DB_PASSWORD:csquiz1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Flyway가 스키마 소유. JPA는 검증만 (엔티티↔테이블 불일치 시 부팅 실패).
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100   # N+1 완화 (로드맵1에서 QueryDSL로 본격 처리)
    open-in-view: false                  # 지연로딩 경계를 서비스 계층으로 명확히
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true            # 기존 DB에도 안전하게 적용

  # 목록 API 페이징 기본값/상한 (docs/03: 기본 20, 최대 100)
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100               # size 초과 요청은 100으로 잘림(과도한 조회 방지)
    # Redis (로드맵 2): 문서 캐시 + refresh 토큰 저장소.
    # 로컬은 WSL의 redis-server(또는 docker compose의 redis).
    # host를 localhost가 아니라 127.0.0.1로 명시한 이유: JVM이 localhost를 IPv6(::1)로
    # 해석할 수 있는데, WSL2의 포트 중계는 IPv4 쪽만 안정적이라 연결이 실패했다(실측).
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      # 캐시는 "빨리 실패"가 원칙: 네트워크가 이상하면 2초 안에 포기하고 DB로 간다.
      # (기본 60초를 그대로 두면 Redis가 어중간하게 죽었을 때 요청이 분 단위로 매달린다 — 실측)
      timeout: 2000ms          # 명령 응답 대기 한도
      connect-timeout: 2000ms  # 연결 수립 한도

springdoc:
  swagger-ui:
    path: /swagger-ui.html               # http://localhost:8080/swagger-ui.html

# 커스텀 JWT 설정 (로드맵 2에서 refresh 토큰 도입 — ADR-0001의 예고 이행)
jwt:
  secret: ${JWT_SECRET:local-dev-secret-please-change-this-to-a-256bit-or-longer-key}
  access-token-validity-seconds: 3600         # 1시간 (짧게 — 탈취 피해 시간 제한)
  refresh-token-validity-seconds: 1209600     # 14일 (Redis TTL로 자동 만료)

# 초기 관리자 계정 (AdminAccountInitializer가 ADMIN 부재 시 생성)
# 요청 제한 (로드맵 3) — 토큰 버킷. 설계는 docs/09, 결정 배경은 ADR-0003.
# capacity = 순간 버스트 허용량, refill-tokens/refill-period-seconds = 장기 평균 속도.
ratelimit:
  enabled: true                  # 부하 테스트·디버깅 시 false로 임시 해제 가능
  auth:                          # 로그인/회원가입/재발급 — IP당. 무차별 대입 방어가 목적
    capacity: 5
    refill-tokens: 5
    refill-period-seconds: 60    # = 분당 5회
  api:                           # 그 외 /api/** — 사용자당(비로그인은 IP당). 폭주만 걸러내는 상한
    capacity: 60
    refill-tokens: 60
    refill-period-seconds: 60    # = 분당 60회

# 로컬 기본값이며, 실 배포에서는 환경변수로 반드시 교체한다.
admin:
  email: ${ADMIN_EMAIL:admin@csquiz.local}
  password: ${ADMIN_PASSWORD:admin1234}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace   # 바인딩 파라미터 값 출력 (개발용)
